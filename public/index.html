<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>원카드 🃏</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="lobby-body">
  <div class="lobby-container">
    <div class="lobby-header">
      <div class="title-card">🃏</div>
      <h1>원카드</h1>
      <p class="subtitle">같은 WiFi에서 최대 10명이 함께!</p>
    </div>

    <div class="lobby-box">
      <div class="input-group">
        <label for="playerName">내 닉네임</label>
        <input type="text" id="playerName" placeholder="닉네임 입력 (최대 12자)" maxlength="12" autocomplete="off">
      </div>

      <div class="lobby-divider">
        <div class="ai-count-box">
          <span class="ai-count-label">🤖 AI 수</span>
          <div class="ai-count-ctrl">
            <button id="soloAiMinus" class="count-btn">─</button>
            <span id="soloAiCount">1</span>
            <button id="soloAiPlus" class="count-btn">+</button>
            <span class="ai-count-unit">명</span>
          </div>
        </div>
        <button id="aiGameBtn" class="btn btn-primary btn-lg btn-block">🤖 AI와 게임하기</button>
        <button id="createBtn" class="btn btn-secondary btn-lg btn-block">👥 멀티플레이 방 만들기</button>
      </div>

      <div class="or-divider"><span>또는</span></div>

      <div class="join-section">
        <div class="input-group">
          <label for="roomCode">방 코드</label>
          <input type="tel" id="roomCode" placeholder="5자리 입력" maxlength="5" autocomplete="off"
            inputmode="numeric" pattern="[0-9]*">
        </div>
        <button id="joinBtn" class="btn btn-secondary btn-lg btn-block">방 참가하기</button>
      </div>

      <div id="errorMsg" class="error-msg hidden"></div>
    </div>

<div class="rules-summary">
      <h3>📖 원카드 규칙</h3>
      <div class="rules-grid">
        <div class="rule-item"><span class="rule-card red">2</span><span>다음 사람 2장 뽑기 (누적 가능)</span></div>
        <div class="rule-item"><span class="rule-card red">A</span><span>다음 사람 3장 뽑기</span></div>
        <div class="rule-item"><span class="rule-card">Q</span><span>방향 전환</span></div>
        <div class="rule-item"><span class="rule-card">J</span><span>다음 사람 1칸 스킵</span></div>
        <div class="rule-item"><span class="rule-card">K</span><span>다음 사람 2칸 스킵</span></div>
        <div class="rule-item"><span class="rule-card">7</span><span>원하는 무늬 선택</span></div>
        <div class="rule-item"><span class="rule-card joker">★</span><span>다음 사람 4장 뽑기 (누적 가능)</span></div>
        <div class="rule-item"><span class="rule-card warn">1장</span><span>반드시 "원카드!" 외치기</span></div>
      </div>
    </div>
  </div>

  <div id="waitingRoom" class="hidden">
    <div class="waiting-container">
      <div class="waiting-header">
        <h2>🃏 대기실</h2>
        <div class="room-code-display">
          <span>방 코드</span>
          <div class="room-code" id="displayRoomCode">-----</div>
          <button class="btn btn-sm" id="copyCodeBtn">복사</button>
        </div>
      </div>

      <div class="player-list" id="playerList"></div>

<div class="waiting-actions">
        <div id="hostControls" class="hidden">
          <p class="host-hint">모든 참가자가 입장하면 게임을 시작하세요</p>
          <div class="ai-count-box">
            <span class="ai-count-label">🤖 AI</span>
            <div class="ai-count-ctrl">
              <button id="aiBotMinus" class="count-btn">─</button>
              <span id="aiBotCount">0</span>
              <button id="aiBotPlus" class="count-btn">+</button>
              <span class="ai-count-unit">명</span>
            </div>
          </div>
          <button id="startGameBtn" class="btn btn-primary btn-lg">게임 시작!</button>
        </div>
        <div id="guestWait" class="hidden">
          <p class="waiting-text">⏳ 호스트가 게임을 시작할 때까지 기다리세요...</p>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="lobby.js"></script>
</body>
</html>
