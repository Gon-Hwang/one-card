<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>원카드 - 게임 중 🃏</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="game-body">

  <!-- 상단 정보 바 -->
  <div class="game-topbar">
    <div class="room-info">방: <strong id="topRoomCode">---</strong></div>
    <div class="turn-info" id="turnInfo">대기 중...</div>
    <div class="direction-info" id="directionInfo">▶ 시계 방향</div>
  </div>

  <!-- 상대방 플레이어들 -->
  <div class="opponents-area" id="opponentsArea"></div>

  <!-- 중앙 게임 보드 -->
  <div class="game-board">
    <div class="draw-pile-area">
      <div class="pile-label">뽑기</div>
      <div class="card card-back draw-pile" id="drawPile" title="카드 뽑기">
        <div class="card-back-design">🃏</div>
      </div>
      <div class="deck-count" id="deckCount">54</div>
    </div>

    <div class="board-center">
      <div id="drawStackBadge" class="draw-stack-badge hidden">+<span id="drawStackNum">0</span></div>
      <div class="current-suit-display hidden" id="currentSuitDisplay">
        <span id="currentSuitIcon"></span>
      </div>
    </div>

    <div class="discard-pile-area">
      <div class="pile-label">버린 패</div>
      <div class="card" id="topCardDisplay">
        <div class="card-rank" id="topCardRank">-</div>
        <div class="card-suit" id="topCardSuit">-</div>
      </div>
    </div>
  </div>

  <!-- 내 손패 영역 -->
  <div class="my-area">
    <div class="my-info">
      <span id="myName">나</span>
      <span class="my-card-count">(<span id="myCardCount">0</span>장)</span>
    </div>
    <div class="my-hand-scroll">
      <div class="my-hand" id="myHand"></div>
    </div>
  </div>

  <!-- 액션 버튼들 -->
  <div class="action-buttons">
    <button class="btn btn-danger one-card-btn hidden" id="oneCardBtn">원카드! 🎴</button>
  </div>

  <!-- 이벤트 알림 -->
  <div class="event-log" id="eventLog"></div>

  <!-- 무늬 선택 모달 -->
  <div class="modal-overlay hidden" id="suitModal">
    <div class="modal">
      <h3>무늬를 선택하세요</h3>
      <div class="suit-grid">
        <button class="suit-btn black" data-suit="♠">♠<br><small>스페이드</small></button>
        <button class="suit-btn red" data-suit="♥">♥<br><small>하트</small></button>
        <button class="suit-btn red" data-suit="♦">♦<br><small>다이아</small></button>
        <button class="suit-btn black" data-suit="♣">♣<br><small>클로버</small></button>
      </div>
    </div>
  </div>

  <!-- 게임 종료 모달 -->
  <div class="modal-overlay hidden" id="gameOverModal">
    <div class="modal game-over-modal">
      <div class="winner-trophy">🏆</div>
      <h2 id="winnerName">누군가</h2>
      <p>님이 승리했습니다!</p>
      <button class="btn btn-primary btn-lg" id="restartBtn">다시 하기</button>
      <button class="btn btn-secondary" id="lobbyBtn">로비로</button>
    </div>
  </div>

  <!-- 채팅/신고 버튼 -->
  <div class="chat-toggle" id="chatToggle">💬</div>

  <!-- 채팅 패널 -->
  <div class="chat-panel hidden" id="chatPanel">
    <div class="chat-header">
      <span>채팅</span>
      <button class="chat-close" id="chatClose">✕</button>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-row">
      <input type="text" id="chatInput" placeholder="메시지..." maxlength="100" autocomplete="off">
      <button class="btn btn-sm btn-primary" id="chatSend">전송</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="game.js"></script>
</body>
</html>
